[colors]
base = #1e1e2e
mantle = #181825
crust = #11111b
text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de
surface0 = #313244
surface1 = #45475a
surface2 = #585b70
overlay0 = #6c7086
overlay1 = #7f849c
overlay2 = #9399b2
blue = #89b4fa
lavender = #b4befe
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
maroon = #eba0ac
red = #f38ba8
mauve = #cba6f7
pink = #f5c2e7
flamingo = #f2cdcd
rosewater = #f5e0dc

[bar/main]
width = 100%
height = 24pt
radius = 0

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt
border-size = 0pt

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.surface2}

# Font configuration
font-0 = SauceCodePro Nerd Font:size=11;2

# THIS IS WHERE THE MAGIC HAPPENS:
modules-left = xworkspaces
modules-center = date
modules-right = fs memory eth systray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.surface1}
label-active-underline= ${colors.mauve}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.overlay0}
label-empty-padding = 1

[module/fs]
type = internal/fs
interval = 25
mount-0 = /
label-mounted =   %percentage_used%%
label-mounted-foreground = ${colors.sapphire}

[module/memory]
type = internal/memory
interval = 2
label = 󰍛  %percentage_used%%
label-foreground = ${colors.green}

[module/eth]
type = internal/network
# This automatically finds your ethernet adapter
interface-type = wired
interval = 2
label-connected =   %local_ip%
label-connected-foreground = ${colors.mauve}
label-disconnected =   Disconnected
label-disconnected-foreground = ${colors.red}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d  %H:%M
label =   %date%
label-foreground = ${colors.lavender}
